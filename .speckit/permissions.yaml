# speckit:managed
version: 1
mode: enterprise
precedence:
  - deny
  - ask
  - allow
defaults:
  file_read: allow_workspace
  file_write: ask
  shell: ask
  network: ask
  external_directory: deny
guards:
  privacy:
    action: deny
    allow_examples: true
    patterns:
      - ".env"
      - ".env.*"
      - "**/.env"
      - "**/.env.*"
      - "**/credentials*"
      - "**/secret.yml"
      - "**/secrets.yml"
      - "**/secret.yaml"
      - "**/secrets.yaml"
      - "**/*.pem"
      - "**/*.key"
      - "**/id_rsa"
      - "**/id_ed25519"
  scout:
    action: deny
    patterns:
      - "node_modules"
      - "dist"
      - "build"
      - ".next"
      - ".nuxt"
      - "__pycache__"
      - ".venv"
      - "venv"
      - "vendor"
      - "target"
      - ".git"
      - "coverage"
  destructive:
    action: deny
    commands:
      - "rm -rf*"
      - "git reset --hard*"
      - "git clean -fd*"
      - "git push --force*"
      - "sudo *"
      - "chmod -R*"
      - "chown -R*"
  release:
    action: ask
    commands:
      - "git push*"
      - "npm publish*"
      - "* deploy*"
      - "vercel --prod*"
      - "fly deploy*"
phases:
  shape:
    file_write:
      - ".speckit/specs/**"
  plan:
    file_write:
      - ".speckit/plans/**"
      - ".speckit/stories/**"
      - ".speckit/evidence/**"
  review:
    file_write: deny
    shell_allow:
      - "git diff*"
      - "git log*"
      - "npm test*"
  ship:
    shell_ask:
      - "git push*"
      - "npm publish*"
      - "* deploy*"
      - "vercel --prod*"
      - "fly deploy*"
